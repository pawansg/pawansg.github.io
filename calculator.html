<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --accent: #c8f135;
      --accent2: #f1c835;
      --text: #f0f0f0;
      --muted: #888;
      --btn-num: #1e1e1e;
      --btn-op: #2a2a2a;
      --btn-eq: var(--accent);
      --radius: 16px;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .calc {
      background: var(--surface);
      border-radius: 28px;
      padding: 24px;
      width: 340px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(200,241,53,0.04);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Display */
    .display {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 20px 22px 16px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .expression {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 18px;
      word-break: break-all;
      text-align: right;
    }

    .result {
      font-size: 42px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.02em;
      word-break: break-all;
      text-align: right;
      line-height: 1;
      transition: font-size 0.15s ease;
    }

    .result.long { font-size: 28px; }

    /* Button grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 400;
      height: 64px;
      transition: all 0.1s ease;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.1s;
    }

    button:active::after { opacity: 0.08; }

    /* Number buttons */
    .btn-num {
      background: var(--btn-num);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .btn-num:hover { background: #252525; border-color: rgba(255,255,255,0.1); }

    /* Operator buttons */
    .btn-op {
      background: var(--btn-op);
      color: var(--accent2);
      font-size: 20px;
      border: 1px solid rgba(241,200,53,0.1);
    }
    .btn-op:hover { background: #303030; }

    /* Clear / special */
    .btn-clear {
      background: #2a1a1a;
      color: #ff6b6b;
      border: 1px solid rgba(255,107,107,0.12);
    }
    .btn-clear:hover { background: #331f1f; }

    /* Equals */
    .btn-eq {
      background: var(--accent);
      color: #0f0f0f;
      font-size: 22px;
      font-weight: 500;
      grid-column: span 2;
      box-shadow: 0 4px 20px rgba(200,241,53,0.25);
    }
    .btn-eq:hover {
      background: #d4f54a;
      box-shadow: 0 6px 28px rgba(200,241,53,0.35);
      transform: translateY(-1px);
    }
    .btn-eq:active { transform: translateY(0); }

    /* Zero wide */
    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 24px;
    }

    /* Active operator highlight */
    .btn-op.active {
      background: rgba(241,200,53,0.15);
      border-color: rgba(241,200,53,0.3);
    }

    .footer {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">pawansg · calculator</div>

  <div class="calc">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="grid">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-op" onclick="toggleSign()">+/−</button>
      <button class="btn-op" onclick="percent()">%</button>
      <button class="btn-op" id="op-/" onclick="setOp('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="input('7')">7</button>
      <button class="btn-num" onclick="input('8')">8</button>
      <button class="btn-num" onclick="input('9')">9</button>
      <button class="btn-op" id="op-*" onclick="setOp('*')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="input('4')">4</button>
      <button class="btn-num" onclick="input('5')">5</button>
      <button class="btn-num" onclick="input('6')">6</button>
      <button class="btn-op" id="op--" onclick="setOp('-')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="input('1')">1</button>
      <button class="btn-num" onclick="input('2')">2</button>
      <button class="btn-num" onclick="input('3')">3</button>
      <button class="btn-op" id="op-+" onclick="setOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num btn-zero" onclick="input('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <div class="footer">use keyboard too ↑</div>
</div>

<script>
  let current = '0';
  let previous = null;
  let operator = null;
  let freshInput = false;
  let justCalculated = false;

  const resultEl = document.getElementById('result');
  const exprEl = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = current;
    resultEl.className = 'result' + (current.length > 9 ? ' long' : '');
  }

  function input(val) {
    if (justCalculated) { current = val; justCalculated = false; operator = null; previous = null; exprEl.textContent = ''; updateDisplay(); return; }
    if (freshInput) { current = val; freshInput = false; }
    else { current = current === '0' ? val : current + val; }
    updateDisplay();
  }

  function inputDot() {
    if (freshInput) { current = '0.'; freshInput = false; }
    else if (!current.includes('.')) { current += '.'; }
    updateDisplay();
  }

  function setOp(op) {
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('op-' + op);
    if (btn) btn.classList.add('active');

    if (operator && !freshInput) calculate(true);
    previous = parseFloat(current);
    operator = op;
    freshInput = true;
    justCalculated = false;
    const symbols = {'+':'+', '-':'−', '*':'×', '/':'÷'};
    exprEl.textContent = previous + ' ' + symbols[op];
  }

  function calculate(intermediate = false) {
    if (operator === null || previous === null) return;
    const cur = parseFloat(current);
    let res;
    switch(operator) {
      case '+': res = previous + cur; break;
      case '-': res = previous - cur; break;
      case '*': res = previous * cur; break;
      case '/': res = cur === 0 ? 'Error' : previous / cur; break;
    }
    if (!intermediate) {
      const symbols = {'+':'+', '-':'−', '*':'×', '/':'÷'};
      exprEl.textContent = previous + ' ' + symbols[operator] + ' ' + cur + ' =';
      document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
    }
    current = res === 'Error' ? 'Error' : String(parseFloat(res.toFixed(10)));
    if (!intermediate) { operator = null; previous = null; justCalculated = true; }
    else { previous = parseFloat(current); freshInput = true; }
    updateDisplay();
  }

  function clearAll() {
    current = '0'; previous = null; operator = null;
    freshInput = false; justCalculated = false;
    exprEl.textContent = '';
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
    updateDisplay();
  }

  function toggleSign() {
    if (current === '0' || current === 'Error') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key)) input(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay();
    }
  });
</script>
</body>
</html>
